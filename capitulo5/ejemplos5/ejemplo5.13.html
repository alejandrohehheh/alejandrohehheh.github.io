<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>
        Fusion de imagenes
    </title>
    <style type="text/css">
        #portada {
            position: relative;
            margin: 0 auto;
        }

        #portada img {
            position: absolute;
            left: 0;
            -webkit-transition: opacity 1s ease-in-out;
            transition: opacity 1s ease-in-out;
        }

        #portada img.top:hover 
        {opacity:0;}
    </style>
</head>

<body>

    <p>
        <a href = "index5.html">
            <img src = "../../imagenes/volver.jpg" width="65" height="50" alt= "vinculos">
        </a>
        <a href = "../../index.html">
            <img src = "../../imagenes/inicio.png" width="65" height="50" alt= "vinculos">
        </a>
    </p>

    <div id="portada">
        <img class="bottom" src="../../imagenes/nico1r.png" alt=" portada de java 9e">
        <img class="top" src="../../imagenes/nico2r.jpg" alt=" portada de java 8e">
    </div>
</body>

</html>
