<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8">
    <title>Borde de imagen</title>

    <style type="text/css">
        div {
            
            border-width: 30px;
            width: 234px;
            padding: 20px 20px;
        }

        #stretch {
            border: solid 30px;
            -webkit-border-image:url(../../imagenes/oceano.jpg)  80 80 80 80 stretch;
            -moz-border-image:url(../../imagenes/oceano.jpg)  80 80 80 80 stretch;
            -o-border-image:url(../../imagenes/oceano.jpg)  80 80 80 80 stretch;
            border-image:url(../../imagenes/oceano.jpg) 80 80 80 80 stretch;
        }

        #repeat {
    
            border: solid 30px;
            -moz-border-image:url(../../imagenes/oceano.jpg) 34% 34% repeat;
            -webkit-border-image:url(../../imagenes/oceano.jpg) 34% 34% repeat;
            -o-border-image:url(../../imagenes/oceano.jpg) 34% 34% repeat;
            border-image:url(../../imagenes/oceano.jpg) 34% 34% repeat;
        }
    </style>
</head>

<body>
    <p>
        <a href = "index5.html">
            <img src = "../../imagenes/volver.jpg" width="65" height="50" alt= "vinculos">
        </a>
        <a href = "../../index.html">
            <img src = "../../imagenes/inicio.png" width="65" height="50" alt= "vinculos">
        </a>
    </p>

    <h2>Bordes de imagen</h2>
    <img src="../../imagenes/oceano.jpg" width="150" height="100">
    <p>
    <div id="stretch">Se estira el borde de la imagen</div>
    </p>
    <p>
    <div id="repeat">Se repite el borde de la imagen</div>
    </p>

</body>

</html>
