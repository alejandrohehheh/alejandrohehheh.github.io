<html>

<head>
    <meta charset="utf-8">
    <title>Esquina reondeadas</title>

    <style type="text/css">
        div {
            border: 3px solid navy;
            padding: 5px 20px;
            background: lightcyan;
            width: 200px;
            text-align: center;
            border-radius: 15px;
            /*agrega esquinas reondeadas*/
            margin-bottom: 20px;
        }

        #redonda2 {
            border: 3px solid navy;
            padding: 5px 20px;
            background: lightcyan;
            width: 200px;
            text-align: center;
            border-radius: 20px;
            /*aumenta border-radius*/
        }
    </style>
</head>
