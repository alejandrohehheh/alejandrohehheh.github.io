<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>
        Fusion de imagenes
    </title>
    <style type="text/css">
        #portada {
                position: relative;
                margin-left: 35%;
            }
            #portada img {
                position: absolute;
                left: 0;
            }
            #portada:hover .top1 {
                opacity: 0;
                -webkit-transition: opacity 3s linear;
                transition: opacity 3s linear;
            }
            #portada:hover .top2 {
                opacity: 0;
                -webkit-transition: opacity 3s linear 3s;
                transition: opacity 3s linear 3s;
            }
            #portada:hover .top3 {
                opacity: 0;
                -webkit-transition: opacity 3s linear 6s;
                transition: opacity 3s linear 6s;
            }
            #portada:hover .top4 {
                opacity: 0;
                -webkit-transition: opacity 3s linear 9s;
                transition: opacity 3s linear 9s;
            }
            #portada:hover .top5 {
                opacity: 0;
                -webkit-transition: opacity 3s linear 12s;
                transition: opacity 3s linear 12s;
            }
        
    </style>
</head>

<body>
    <p>
        <a href = "indexej5.html">
            <img src = "../../imagenes/volver.jpg" width="65" height="50" alt= "vinculos">
        </a>
        <a href = "../../index.html">
            <img src = "../../imagenes/inicio.png" width="65" height="50" alt= "vinculos">
        </a>
    </p>

    <div id="portada">

        <img class="top4" src="../../imagenes/nico2r.jpg" alt=" portada de java 8e">
        <img class="top3" src="../../imagenes/mikur.png" alt=" portada de java 8e">
        <img class="top2" src="../../imagenes/02r.png" alt=" portada de java 8e">
        <img class="top1" src="../../imagenes/nico1r.png" alt=" portada de java 8e">
        
      
        
    </div>
    
</body>

</html>
