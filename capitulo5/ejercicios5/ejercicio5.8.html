<html>
    <head>
        <meta charset="utf-8">
        <title>Gradiente radial</title>
        <style type="text/css">
            div {
                width: 500px;
                height: 500px;
                padding: 15px;
                text-align: center;
                background: -webkit-radial-gradient(bottom left, yellow, green, cyan);
                background: -moz-radial-gradient(center, yellow, green, cyan);
                background: radial-gradient(top right, yellow, green, cyan);
            }
            h1{ /*opcional, no venia en el ejercicio */
                text-shadow: -4px 4px 6px white; /*agrega sombra*/
                font-size: 400%; /*aumenta el tamaño de la fuente */
            }
        </style>
    </head>
