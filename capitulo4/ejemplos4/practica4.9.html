<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8">
    <title>Bordes</title>

    <style type="text/css">
        div {
            text-align: center;
            width: 50%;
            position: relative;
            left: 25%;
            border-width: 6px;
        }

        .thick {
            border-width: thick;
        }

        .medium {
            border-width: medium;
        }

        .thin {
            border-width: thin;
        }

        .solid {
            border-style: solid;
        }

        .double {
            border-style: double;
        }

        .groove {
            border-style: groove;
        }

        .ridge {
            border-style: ridge;
        }

        .dotted {
            border-style: dotted;
        }

        .inset {
            border-style: inset;
        }

        .outset {
            border-style: outset;
        }

        .dashed {
            border-style: dashed;
        }

        .red {
            border-color: red;
        }

        .blue {
            border-color: blue;
        }
    </style>
</head>

<body>
    <a href = "index4.html">
        <img src = "../../imagenes/volver.jpg" width="65" height="50" alt= "vinculos">
    </a>
    <a href = "../../index.html">
        <img src = "../../imagenes/inicio.png" width="65" height="50" alt= "vinculos">
    </a>

    <div class="solid"> Borde solido</div>
    <hr>
    <div class="double">Doble borde</div>
    <hr>
    <div class="groove">Borde granurado</div>
    <hr>
    <div class="ridge">Borde rugoso</div>
    <hr>
    <div class="dotted">Borde punteadp</div>
    <hr>
    <div class="inset">Borde incrustado</div>
    <hr>
    <div class="thick dashed">Borde rugoso intermitente</div>
    <hr>
    <div class="thin red solid">Borde solido rojo delgado</div>
    <hr>
    <div class="medium blue outset">Borde saliente azul mediano</div>
</body>

</html>
