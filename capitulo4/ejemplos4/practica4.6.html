<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <title>Posicionamiento realtivo de los elementos</title>

        <style type="text/css">
         p {font-size:1.3em;
        font-family: verdana, arial, sans-serif;}

        span {color: red;
        font-size: .6em;
        height: 1em;}
        .super {position:relative;
            top: -1ex;}
        .sub {position: relative;
            bottom: -1ex;}
        .desplizq {position: relative;
            left: -1ex;}
        .desplder {position: relative;
            right: -1ex;}
</style>
    </head>
    <body>
        <a href = "index4.html">
            <img src = "../../imagenes/volver.jpg" width="65" height="50" alt= "vinculos">
        </a>
        <a href = "../../index.html">
            <img src = "../../imagenes/inicio.png" width="65" height="50" alt= "vinculos">
        </a>
        <p>El texto al final de esta oracion <span class="super">esta en superindice</span></p>

        <p>El texto al final de esta oracion <span class="sub">esta en subindice</span></p>

        <p>El texto al final de esta oracion <span class="desplizq">esta desplazado a la izquierda</span></p>

        <p>El texto al final de esta oracion <span class="desplder">esta desplazado a la derecha</span></p>
    </body>
</html>
