<!DOCTYPE html>

<html>
    <!--4.1 estilos de linea-->
    <head>
        <meta charset="utf-8">
        <title>Estilos de linea</title>
    </head>

    <body>
        <a href = "index4.html">
            <img src = "../../imagenes/volver.jpg" width="65" height="50" alt= "vinculos">
        </a>
        <a href = "../../index.html">
            <img src = "../../imagenes/inicio.png" width="65" height="50" alt= "vinculos">
        </a>
        <p>Este texto no tiene aplicado ningun estilo</p>

        <!--Atributo style nos permite declarar
        estilos de linea.
        debemos separar varias propiedades de style con un punto y coma-->

        <p style="font-size: 20pt;">Este texto tiene aplicado el estilo
        <em>font size</em>, para que sea de 20pt.</p>

        <p style="font-size: 20pt; color: deepskyblue">Este texto tiene aplicado el estilo
            <em>font size</em>, para que sea de 20pt y color azul cielo profundo</p>
    </body>
</html>
