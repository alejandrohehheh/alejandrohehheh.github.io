    <head>
        <meta charset="utf-8">
        <title>
            Un programa de suma
        </title>

        <script>

            var primerNumero;
            var segundoNumero;
            var numero1;
            var numero2;
            var suma;

            primerNumero = window.prompt("Escriba el primer entero");

            segundoNumero = window.prompt("Escriba el segundo entero");

            //convierte los numeros de las cadenas a enteros
            numero1 = parseInt (primerNumero);
            numero2 = parseInt (segundoNumero);

            suma = numero1 + numero2;

            //muestra resultados
            document.writeln("<h1>La suma es "+suma+"</1>");
        </script>
