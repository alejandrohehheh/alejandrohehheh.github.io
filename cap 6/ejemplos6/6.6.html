    <head>
        <meta charset="utf-8">
        <title>
            Uso de operadores relacionales
        </title>
        <script>

            var nombre;
            var ahora = new Date();
            var hora = ahora.getHours();

            nombre = window.prompt("Escriba su nombre");

            //determina si es de mañana
            if (hora<12)
            document.write("<h1>Buenos dias, ");
            
            //determina si la hora es PM
           else if (hora=>12)
            {
                //convierte a reloj de 12 horas
                hora = hora - 12;

                if(hora<6)
                document.write("<h1>Buenas tardes, ");

                    if(hora>=6)
                    document.write("<h1>Buenas noches, ");
            } //if

            document.writeln(nombre+
            ", bienvenido a la programacion javascript</h1>");



        </script>
