    <script>
        var Kilometros;
        var litros;
        var kilometrosPorLitro;
        var kilometrosInt;
        var litrosInt;
        var operacion;
        var contador;


        operacion = 1;
        kilometrosPorLitro = 0;
        contador = 1;



        document.writeln("<h1>Kilometros recorridos por litro: ")
        while (operacion == 1) {
            operacion = window.prompt(

                "1= ingresar datos; -1= salir "
            );
            if (operacion == 1) {
                kilometros = window.prompt(
                    "Kilometros recorridos: "
                );
                litros = window.prompt(
                    "Litros usados: "
                );

                kilometrosInt = parseFloat(kilometros);
                litrosInt = parseFloat(litros);
                kilometrosPorLitro = kilometrosInt / litrosInt;
                document.writeln("<p>Auto "+contador+": " + kilometrosPorLitro + " kilometros por litro</p>");
                contador++;
            }
            else {

            }

        } 

    </script>
