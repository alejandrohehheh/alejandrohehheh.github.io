<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>
            Programa del promedio de una clase: repeticion controlada por centinela
        </title>
        <p>
            <a href = "index7.html">
                <img src = "../../imagenes/volver.jpg" width="65" height="50" alt= "vinculos">
            </a>
            <a href = "../../index.html">
                <img src = "../../imagenes/inicio.png" width="65" height="50" alt= "vinculos">
            </a>
        </p>
        <script>
            var total;
            var contadorCalificaciones;
            var calificacion;
            var valorCalificacion;
            var promedio;
            var menosUno;

            //fase inciializacion
            total = 0;
            contadorCalificaciones = 1;
            menosUno = -1;

        //frase procesamiento
        //pedir entrada y leer calificacion de usuario

        calificacion = window.prompt(

        "Escriba la claificacion entera. -1 para salir:" , "0"
        );

        valorCalificacion = parseInt(calificacion);

        while(valorCalificacion != menosUno){
            total = total +valorCalificacion;
            contadorCalificaciones =  contadorCalificaciones+1;
            calificacion = window.prompt("Escriba la claificacion entera. -1 para salir:" , "0");
            valorCalificacion=parseInt(calificacion);
        } //fin while

        if(contadorCalificaciones !=0){
            promedio =total/contadorCalificaciones;

            document.writeln(
                "<h1>El promedio de la clase es " + promedio + "</h1>"
            );
        }
        </script>
    </head>
    <body></body>
</html>
