<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>
            Programa del promedio de una clase
        </title>
        <p>
            <a href = "index7.html">
                <img src = "../../imagenes/volver.jpg" width="65" height="50" alt= "vinculos">
            </a>
            <a href = "../../index.html">
                <img src = "../../imagenes/inicio.png" width="65" height="50" alt= "vinculos">
            </a>
        </p>
        <script>
            var total;
            var contadorCalificaciones;
            var calificacion;
            var valorCalificacion;
            var promedio;

            //fase inicializacion
            total= 0;
            contadorCalificaciones=1;

            //fase procesamiento
            while(contadorCalificaciones<=10){
                //pedir entrada y leer calificacion usuario
                calificacion = window.prompt ( "Escriba la calificacion entera:", "0" );
                
                //convertir calificacion de cadena en entero
                valorCalificacion = parseInt ( calificacion );

                //sumar valorCalificacion al total
                total = total + valorCalificacion;

                //agregar 1 al contadorCalificaciones
                contadorCalificaciones = contadorCalificaciones + 1;
            }

            //fase termincacion
            promedio = total /10;

            //mostrar promedio de las calificaciones de los examenes 
            document.writeln(
                "<h1>El promedio de la clase es "+ promedio + "</h1>");
            
        </script>
    </head>
    <body></body>
</html>
