<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>
        Analisis de los resultados de un examen </title>
        <p>
            <a href = "index7.html">
                <img src = "../../imagenes/volver.jpg" width="65" height="50" alt= "vinculos">
            </a>
            <a href = "../../index.html">
                <img src = "../../imagenes/inicio.png" width="65" height="50" alt= "vinculos">
            </a>
        </p>
    <script>
        var aprobados = 0;
        var reprobados = 0;
        var estudiante = 1;
        var resultado;

        while (estudiante <= 10) {
            resultado = window.prompt("Escriba el resultado (1=aprobado, 2=reporbado)", "0");

            if (resultado == "1")
                aprobados = aprobados + 1;

            else
                reprobados = reprobados + 1;

            estudiante = estudiante + 1;
        }
        document.writeln("<h1>Resultados del examen</h1>");
        document.writeln("<p>Aprobados: " + aprobados +
            "; Reprobados: " + reprobados + "</p>");

        if (aprobados > 8)
            document.writeln("<p>Bono para el instrutor</p>");
    </script>
</head>

<body></body>

</html>
