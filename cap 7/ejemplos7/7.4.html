<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Preincremento y postincremento</title>
    <p>
        <a href = "index7.html">
            <img src = "../../imagenes/volver.jpg" width="65" height="50" alt= "vinculos">
        </a>
        <a href = "../../index.html">
            <img src = "../../imagenes/inicio.png" width="65" height="50" alt= "vinculos">
        </a>
    </p>
    <script>
        var c;

        c = 5;

        document.writeln("<h3>Postincremento</h3>");
        document.writeln("<p>" + c);
        //imprime 5 y luego incrementa
        document.writeln(" " + c++);
        document.writeln(" " + c + "</p>");

        c = 5;
        document.writeln("<h3>Preincremento</h3>");
        document.writeln("<p>" + c);
        //incrementa y luego imprime 6
        document.writeln(" " + ++c);
        document.writeln(" " + c + "</p>");

    </script>
</head>

</html>
